<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/Game-zone-Dev-Core/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanilla App Template</title>
  
  <script type="module" crossorigin src="/Game-zone-Dev-Core/assets/index-99a6ec52.js"></script>
  <link rel="stylesheet" href="/Game-zone-Dev-Core/assets/index-66886d44.css">
</head>

<body>
  <!-- Loads the specified .html file -->
  <header class="header">
    <div class="header__container">

        <div class="header__logo logo">
            <i class="logo__icon ph ph-code"></i>
            <div class="logo__text">
                <span class="logo__title">Coding</span>
                <span class="logo__subtitle">Magic</span>
            </div>
        </div>

        <nav class="header__nav nav">
            <div class="nav__item nav__item--dropdown">
                Інтерактив <i class="nav__icon ph ph-caret-down"></i>
            </div>
            <a href="#" class="nav__link">Наша команда</a>
            <a href="#" class="nav__link">Контакти</a>
        </nav>

        <div class="header__controls controls">
            <div class="controls__theme-toggle theme-toggle">
                <div class="theme-toggle__button">
                    <i class="theme-toggle__icon ph-fill ph-sun"></i>
                </div>
            </div>
            <div class="controls__greeting user-greeting">
                Вітаємо, User!
            </div>
        </div>
    </div>
</header>
  <main>
    <h1>Популярні інтерактивні ігри</h1>
    <section class="section-block section-block--leap-year">
    <h2 class="section-block__title">Перевір в який рік ти народився</h2>

    <div class="section-block__content">
        <div class="section-block__input-wrapper input-group">
            <input type="text" placeholder="Введіть рік народження" class="input-group__field">
            <button class="input-group__button">
                <i class="input-group__icon ph ph-magnifying-glass"></i>
            </button>
        </div>

        <div class="section-block__result section-block__result--success section-block__result--hidden">
            Ви народилися у високосний рік!
        </div>
        <div class="section-block__result section-block__result--error">
            Ви народилися не у високосний рік!
        </div>
    </div>
</section>
    
    
    
    <section class="section-block section-block--time-calculator">
    <h2 class="section-block__title">Калькулятор часу</h2>

    <div class="section-block__content">
        <div class="section-block__input-wrapper input-group">
            <input type="text" placeholder="Введіть число" class="input-group__field">
            <button class="input-group__button">
                <i class="input-group__icon ph ph-magnifying-glass"></i>
            </button>
        </div>

        <div class="section-block__divider"></div>

        <div class="section-block__result section-block__result--time"></div>
    </div>
</section>
    <section class="section-block section-block--three-numbers">
    <h2 class="section-block__title">Введіть 3 числа</h2>

    <div class="section-block__content">
        <div class="section-block__inputs-row">
            <input type="text" placeholder="Введіть число" class="section-block__input-field">
            <input type="text" placeholder="Введіть число" class="section-block__input-field">
            <input type="text" placeholder="Введіть число" class="section-block__input-field">
        </div>

        <div class="section-block__result section-block__result--max-number"></div>
    </div>
</section>
    
    
    
  </main>

  

  
</body>
</html>
