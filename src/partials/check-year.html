<section class="section-block section-block--leap-year">
    <h2 class="section-block__title">Перевір в який рік ти народився</h2>

    <div class="section-block__content">
        <div class="section-block__input-wrapper input-group">
            <input type="text" placeholder="Введіть рік народження" class="input-group__field">
            <button class="input-group__button">
                <i class="input-group__icon ph ph-magnifying-glass"></i>
            </button>
        </div>

        <div class="section-block__result section-block__result--success section-block__result--hidden">
            Ви народилися у високосний рік!
        </div>
        <div class="section-block__result section-block__result--error">
            Ви народилися не у високосний рік!
        </div>
    </div>
</section>
