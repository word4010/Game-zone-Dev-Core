<div class="section-block section-block--time-calculator">
    <div class="container section-block__container">
        <hr class="section-block__line">
        <h2 class="section-block__title">Калькулятор часу</h2>

        <div class="section-block__content time-calculator__content">

            <div class="section-block__input-wrapper input-group">
                <input type="text" placeholder="Введіть число" class="input-group__field">
                <button class="input-group__button">
                    <img src="./img/search.svg" alt="Search" class="input-group__icon">
                </button>
            </div>

            <div class="section-block__divider-dots"></div>
            <p class="section-block__result section-block__result--time">
                3 дн. 15:45:01
            </p>

        </div>
        <hr class="section-block__line">
    </div>
</div>
